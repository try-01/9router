name: Build 9router

on:
  workflow_dispatch: # Memungkinkan Anda menjalankan build secara manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies & Build
        run: |
          cp .env.example .env
          npm install
          npm run build

      - name: Package Build Artifacts
        run: |
          # Mengompres file yang dibutuhkan untuk runtime saja
          tar -czf 9router-build.tar.gz .next public package.json package-lock.json next.config.js next.config.mjs .env 2>/dev/null || tar -czf 9router-build.tar.gz .next package.json package-lock.json .env

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 9router-build-pkg
          path: 9router-build.tar.gz
